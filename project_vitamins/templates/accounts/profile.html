{% extends "base.html" %}

{% block title %}Profile | VitaminSHE{% endblock %}

{% block content %}
<section class="auth-wrap">
    <h2>Your profile</h2>
    <p>Update your health preferences anytime.</p>
    <form method="post" class="card form-card">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <div class="form-row">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button type="submit" class="btn-primary">Save profile</button>
    </form>
</section>
{% endblock %}
